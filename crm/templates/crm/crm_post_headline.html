{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Post Headline</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/student_profile.css' %}">
</head>
<body>

    <!-- Sidebar -->
    {% include 'crm/sidebar.html' %}

    <!-- Main Content -->
    <div class="container mt-5">
        <h2 class="text-center mb-4">Post a New Headline</h2>
    
        <!-- Display Success Message -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    
        <div class="card shadow-lg p-4">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
    
                <!-- Title Field -->
                <div class="mb-3">
                    <label for="title" class="form-label">Headline Title</label>
                    <input type="text" class="form-control" id="title" name="title" placeholder="Enter headline title" required>
                </div>
    
                <!-- Content Field -->
                <div class="mb-3">
                    <label for="content" class="form-label">Content</label>
                    <textarea class="form-control" id="content" name="content" rows="5" placeholder="Enter headline content" required></textarea>
                </div>
    
                <!-- Image Upload -->
                <div class="mb-3">
                    <label for="image" class="form-label">Upload Image</label>
                    <input type="file" class="form-control" id="image" name="image" accept="image/*">
                </div>
    
                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary w-100">Post Headline</button>
            </form>
        </div>
    </div>


<div class="footer text-center mt-4">
        © 2025 University Portal | All Rights Reserved
</div>    
</body>
</html>
