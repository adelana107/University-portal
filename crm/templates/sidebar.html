<div class="sidebar d-flex flex-column">
    <h3 class="text-center text-white mb-4">OceanView Admin</h3>
    <ul class="nav flex-column">
        <li class="nav-item">
            <a href="{% url 'dashboard' %}" class="nav-link text-white">
                <i class="fas fa-home me-2"></i> Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a href="{% url 'applicant_list' %}" class="nav-link text-white">
                <i class="fas fa-users me-2"></i> Applications
            </a>
        </li>
        
        <!-- Settings with Dropdown -->
        <li class="nav-item">
            <a href="#" class="nav-link text-white d-flex align-items-center" data-bs-toggle="collapse" data-bs-target="#settingsDropdown">
                <i class="fas fa-cog me-2"></i> Settings <i class="fas fa-chevron-down ms-auto"></i>
            </a>
            <div class="collapse" id="settingsDropdown">
                <ul class="nav flex-column ps-4">
                    <!-- Dark Mode Toggle -->
                    <li class="nav-item">
                        <button onclick="toggleDarkMode()" id="darkModeToggle" class="nav-link text-white bg-transparent border-0">
                            <i id="darkModeIcon" class="fas fa-moon me-2"></i> <span id="darkModeText">Switch to Dark Mode</span>
                        </button>
                    </li>
                </ul>
            </div>
        </li>
    </ul>
</div>

<!-- Dark Mode Styles -->
<style>
    .sidebar {
        height: 100vh;
        width: 250px;
        position: fixed;
        top: 0;
        left: 0;
        background: #2c3e50; /* Dark Blue */
        padding: 20px;
        transition: 0.3s ease;
    }
    .sidebar h3 {
        font-size: 1.5rem;
        font-weight: bold;
    }
    .sidebar .nav-link {
        padding: 10px;
        border-radius: 5px;
        margin: 5px 0;
        transition: background 0.3s ease;
    }
    .sidebar .nav-link:hover {
        background: #34495e; /* Slightly lighter blue */
    }
    .sidebar .nav-link i {
        font-size: 1.2rem;
    }
    .collapse .nav-link {
        padding-left: 20px;
    }
    /* Dark Mode */
    .dark-mode {
        background-color: #121212 !important;
        color: #ffffff !important;
        transition: background 0.3s ease, color 0.3s ease;
    }
    .dark-mode .sidebar {
        background: #1a1a2e !important;
    }
    .dark-mode .nav-link {
        color: #ddd !important;
    }
    .dark-mode .nav-link:hover {
        background: #333 !important;
    }
</style>

<!-- JavaScript for Dark Mode -->
<script>
    function toggleDarkMode() {
        const body = document.body;
        const icon = document.getElementById("darkModeIcon");
        const text = document.getElementById("darkModeText");

        // Toggle dark mode
        body.classList.toggle("dark-mode");

        // Check current mode and update text/icon
        const isDarkMode = body.classList.contains("dark-mode");
        localStorage.setItem("darkMode", isDarkMode ? "enabled" : "disabled");

        if (isDarkMode) {
            text.innerText = "Switch to Light Mode";
            icon.classList.replace("fa-moon", "fa-sun");
        } else {
            text.innerText = "Switch to Dark Mode";
            icon.classList.replace("fa-sun", "fa-moon");
        }
    }

    // Apply Dark Mode on page load if it was enabled
    document.addEventListener("DOMContentLoaded", function () {
        const body = document.body;
        const icon = document.getElementById("darkModeIcon");
        const text = document.getElementById("darkModeText");

        if (localStorage.getItem("darkMode") === "enabled") {
            body.classList.add("dark-mode");
            text.innerText = "Switch to Light Mode";
            icon.classList.replace("fa-moon", "fa-sun");
        } else {
            text.innerText = "Switch to Dark Mode";
            icon.classList.replace("fa-sun", "fa-moon");
        }
    });
</script>

<!-- Bootstrap JS for Dropdown -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
