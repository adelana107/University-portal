{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <!-- Bootstrap & Custom CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/portal_student_navbar.css' %}">

    <!-- FontAwesome for Icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
</head>
<body>

    <!-- Navbar -->
    {% include 'portal_navbar.html' %}

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar Column -->
            <div class="col-md-3 col-lg-2 d-md-block sidebar">
                {% include 'portal_sidebar.html' %}
            </div>
            
            <!-- Main Content Column -->
            <div class="col-md-20 col-lg-20 ms-sm-auto px-md-10 py-50 main-content">
                <div class="content">
                    <div class="text-center mb-4">
                        <h2 class="header-title">Course Registration</h2>
                    </div>
            
                    <!-- ✅ Table Structure -->
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>#</th>
                                    <th>Course Code</th>
                                    <th>Course Title</th>
                                    <th>Units</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for course in courses %}
                                <tr>
                                    <td class="text-center">
                                        <input type="checkbox" class="course-checkbox" id="course_{{ course.id }}">
                                    </td>
                                    <td>{{ course.code }}</td>
                                    <td>{{ course.title }}</td>
                                    <td>{{ course.unit }}</td>
                                </tr>
                                {% empty %}
                                <tr>
                                    <td colspan="4" class="text-center">No courses available.</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
            
                    <!-- ✅ Action Buttons -->
                    <div class="text-center mt-3">
                        <button class="btn btn-primary" onclick="submitCourses()">Submit Registration</button>
                        <button class="btn btn-danger">❌ Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!-- Add this after the table for status messages -->
<div id="registration-status" class="mt-3" style="display: none;">
    <div class="alert alert-dismissible fade show" role="alert">
        <span id="status-message"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<!-- Add this script section -->
<script>
function submitCourses() {
    const selectedCourses = [];
    document.querySelectorAll('.course-checkbox:checked').forEach(checkbox => {
        selectedCourses.push(checkbox.id.replace('course_', ''));
    });
    
    // Here you would typically make an AJAX call to submit the courses
    fetch('/submit-registration/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({courses: selectedCourses})
    })
    .then(response => response.json())
    .then(data => {
        const statusDiv = document.getElementById('registration-status');
        const messageSpan = document.getElementById('status-message');
        statusDiv.style.display = 'block';
        if(data.success) {
            statusDiv.querySelector('.alert').classList.add('alert-success');
            messageSpan.textContent = 'Registration successful!';
        } else {
            statusDiv.querySelector('.alert').classList.add('alert-danger');
            messageSpan.textContent = data.message || 'Registration failed';
        }
    });
}

<button class="btn btn-danger" onclick="window.location.href='{% url 'student_portal' %}'">Cancel</button>
</script>
