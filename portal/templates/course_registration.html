{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration</title>

    <!-- Bootstrap & Custom Styles -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/student_portal.css' %}">
</head>
<body>

    <!-- Sidebar -->
    {% include 'portal_sidebar.html' %}

    <div class="content">
        <div class="text-center mb-4">
            <h2 class="header-title">Course Registration</h2>
        </div>

        <div class="container">
            <div class="table-responsive">
                <table class="table table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th>Select</th>
                            <th>Course Code</th>
                            <th>Course Title</th>
                            <th>Units</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for course in courses %}
                        <tr>
                            <td class="text-center">
                                <input type="checkbox" class="course-checkbox" id="course_{{ course.id }}">
                            </td>
                            <td>{{ course.code }}</td>
                            <td>{{ course.title }}</td>
                            <td>{{ course.unit }}</td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="4" class="text-center">No courses available.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

            <div class="text-center mt-3">
                <button class="btn btn-primary" onclick="submitCourses()">Submit Registration</button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function submitCourses() {
            let selectedCourses = [];
            document.querySelectorAll('.course-checkbox:checked').forEach((checkbox) => {
                selectedCourses.push(checkbox.id.replace("course_", ""));
            });

            if (selectedCourses.length === 0) {
                alert("Please select at least one course.");
                return;
            }

        }
    </script>

</body>
</html>
