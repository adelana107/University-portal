{%load static%}
<link rel="stylesheet" href="{% static 'css/portal_navbar.css' %}">


<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'student_portal' %}">Student Portal</a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'student_portal' %}"><i class="fas fa-home"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'course_registration' %}"><i class="fas fa-book"></i> Courses</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'student_biodata' %}"><i class="fas fa-user"></i> Bio-Data</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-bell"></i> Notifications</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-credit-card"></i> Payments</a></li>

                <!-- Dropdown for Settings -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="settingsDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-cog"></i> Settings
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="settingsDropdown">
                        <li><button class="dropdown-item" onclick="toggleDarkMode()"><i id="darkModeIcon" class="fas fa-moon"></i> <span id="darkModeText">Switch to Dark Mode</span></button></li>
                    </ul>
                </li>

                <!-- Logout Button -->
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (localStorage.getItem("dark-mode") === "enabled") {
            document.body.classList.add("dark-mode");
            document.getElementById("darkModeText").innerText = "Switch to Light Mode";
            document.getElementById("darkModeIcon").classList.replace("fa-moon", "fa-sun");
        }
    });

    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");

        let darkModeText = document.getElementById("darkModeText");
        let darkModeIcon = document.getElementById("darkModeIcon");

        if (document.body.classList.contains("dark-mode")) {
            darkModeText.innerText = "Switch to Light Mode";
            darkModeIcon.classList.replace("fa-moon", "fa-sun");
            localStorage.setItem("dark-mode", "enabled");
        } else {
            darkModeText.innerText = "Switch to Dark Mode";
            darkModeIcon.classList.replace("fa-sun", "fa-moon");
            localStorage.setItem("dark-mode", "disabled");
        }
    }
</script>
