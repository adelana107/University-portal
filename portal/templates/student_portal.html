{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link rel="stylesheet" href="{% static 'css/student_portal.css' %}">
</head>
<body>

    <!-- Sidebar -->
    {% include 'portal_sidebar.html' %}

    <!-- Main Content -->
    <div class="content">
        {% for student in students %}
            <h1>Welcome! {{ student.surname }}</h1>
            <div class="dashboard">
                <div class="card">
                    <h3>Total Courses</h3>
                    <p>5</p>
                </div>
                <div class="card">
                    <h3>GPA</h3>
                    <p>3.8</p>
                </div>
                <div class="card">
                    <h3>Pending Payments</h3>
                    <p>$200</p>
                </div>
            </div>
        {% endfor %}
    </div>

</body>
</html>
