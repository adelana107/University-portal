<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apply for Admission</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">
    <div class="container my-5">
        <h2 class="text-center text-primary">Apply for Admission</h2>
        <div class="card p-4 shadow-lg">
            <form method="post" enctype="multipart/form-data">  <!-- enctype is required -->
                {% csrf_token %}
            
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <small class="text-danger">{{ field.errors.0 }}</small>
                    {% endif %}
                </div>
                {% endfor %}
            
                <button type="submit" class="btn btn-success w-100">Submit Application</button>
            </form>
            
        </div>
    </div>

    <script>
        // Store all LGAs data
        const allLGAs = {{ all_lgas_json|safe }};
        
        $(document).ready(function() {
            // Handle school-course dependency
            $("#id_school").change(function() {
                const schoolId = $(this).val();
                const courseField = $("#id_course");

                courseField.empty().append('<option value="">Loading...</option>').prop("disabled", true);

                if (schoolId) {
                    $.ajax({
                        url: "{% url 'get_courses' %}",
                        data: { 'school_id': schoolId },
                        success: function(data) {
                            courseField.empty().append('<option value="">Select Course</option>').prop("disabled", false);
                            data.courses.forEach(course => {
                                courseField.append(new Option(course.name, course.id));
                            });
                        },
                        error: function() {
                            courseField.empty().append('<option value="">Error loading courses</option>').prop("disabled", false);
                        }
                    });
                }
            });
            
            // Handle state-LGA dependency
            $("#id_state_of_origin").change(function() {
                const stateId = $(this).val();
                const lgaField = $("#id_local_government");

                lgaField.empty().append('<option value="">Loading...</option>').prop("disabled", true);

                if (stateId && allLGAs[stateId]) {
                    lgaField.empty().append('<option value="">Select Local Government</option>').prop("disabled", false);
                    allLGAs[stateId].forEach(lga => {
                        lgaField.append(new Option(lga.name, lga.id));
                    });
                } else {
                    lgaField.empty().append('<option value="">No LGAs found</option>').prop("disabled", false);
                }
            });
        });
    </script>
</body>
</html>
