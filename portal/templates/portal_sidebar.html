<!-- Dark Mode Script (Placed at end of body) -->
<script>
    function toggleDarkMode() {
        const body = document.body;
        const icon = document.getElementById("darkModeIcon");
        const text = document.getElementById("darkModeText");

        body.classList.toggle("dark-mode");

        const isDarkMode = body.classList.contains("dark-mode");
        localStorage.setItem("darkMode", isDarkMode ? "enabled" : "disabled");

        if (isDarkMode) {
            text.innerText = "Switch to Light Mode";
            icon.classList.replace("fa-moon", "fa-sun");
        } else {
            text.innerText = "Switch to Dark Mode";
            icon.classList.replace("fa-sun", "fa-moon");
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        if (localStorage.getItem("darkMode") === "enabled") {
            document.body.classList.add("dark-mode");
            document.getElementById("darkModeIcon").classList.replace("fa-moon", "fa-sun");
            document.getElementById("darkModeText").innerText = "Switch to Light Mode";
        }
    });
</script>

<script>
    function toggleSettings() {
        const dropdown = document.getElementById("settingsDropdown");
        const icon = document.getElementById("settingsIcon");

        // Toggle show/hide class
        if (dropdown.style.display === "block") {
            dropdown.style.display = "none";
            icon.classList.replace("fa-chevron-up", "fa-chevron-down");
        } else {
            dropdown.style.display = "block";
            icon.classList.replace("fa-chevron-down", "fa-chevron-up");
        }
    }
</script>
