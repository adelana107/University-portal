{% load static  %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Login</title>

    <!-- Bootstrap & Google Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/student_portal_login.css' %}">


    <script>
        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
        }
    </script>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>

    <div class="login-container">
        <h3 class="login-title">Student Login</h3>

        {% if error %}
            <div class="alert alert-danger text-center p-2">
                {{ error }}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Application Number</label>
                <input type="text" name="application_number" class="form-control" required placeholder="Enter Application Number">
            </div>

            <div class="mb-3">
                <label class="form-label">Surname</label>
                <input type="password" name="surname" class="form-control" required placeholder="Enter Surname">
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <p class="forgot-password mt-3">
            <a href="#">Forgot Password?</a>
        </p>
    </div>

</body>
</html>
