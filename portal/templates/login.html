<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Applicant Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px;">
        <h3 class="text-center text-primary mb-3">Applicant Login</h3>

        {% if error %}
            <div class="alert alert-danger text-center p-2">
                {{ error }}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Application Number</label>
                <input type="text" name="application_number" class="form-control" required placeholder="Enter Application Number">
            </div>

            <div class="mb-3">
                <label class="form-label">Surname</label>
                <input type="password" name="surname" class="form-control" required placeholder="Enter Surname">
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <p class="text-center mt-3">
            <a href="#" class="text-decoration-none">Forgot Password?</a>
        </p>
    </div>
</body>
</html>
